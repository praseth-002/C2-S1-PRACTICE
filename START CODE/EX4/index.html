<!DOCTYPE html>

<html>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            text-align: left;
        }
        table {
            width: 45%;
        }
        th {
            background-color: rgb(180, 180, 180);
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
    <head>
        <title>Table</title>
    </head>
    <body>
        <h1 style="text-align: center;">Welcome to my random store</h1>
        <table style="margin-left: auto; margin-right: auto;">
            <tr>
                <th>Ref Image</th>
                <th>Product Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Instock</th>
            </tr>
            <tr>
                <td><img src="img/bbx.jpg" width="50px" height="50px"></td>
                <td>Beyblade</td>
                <td>10$</td>
                <td>7</td>
                <td>Yes</td>
            </tr>
            <tr>
                <td><img src="img/pkmcard.jpg" width="50px" height="50px"></td>
                <td>Pokemon Cards</td>
                <td>5$</td>
                <td>24</td>
                <td>Yes</td>
            </tr>
            <tr>
                <td><img src="img/fumo.jpg" width="50px" height="50px"></td>
                <td>Fumo</td>
                <td>99$</td>
                <td>0</td>
                <td>No</td>  
            </tr>
        </table>
    </body>
</html>
